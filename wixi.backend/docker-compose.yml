services:
  # Development Environment
  wixi-d001-backend:
    build:
      context: ..
      dockerfile: wixi.backend/wixi.WebAPI/Dockerfile
    container_name: wixi-d001-backend
    ports:
      - "6012:6012"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:6012
      - ConnectionStrings__DefaultConnection=Server=78.188.86.124,1533;Database=wixi.D001;User Id=wixi.D001;Password=wixi.D001;TrustServerCertificate=True;
    volumes:
      - ./wixi.WebAPI/Logs:/app/Logs
      - ./wixi.WebAPI/wwwroot:/app/wwwroot
    networks:
      - wixi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  wixi-network:
    driver: bridge

