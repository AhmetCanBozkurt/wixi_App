name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          LATEST=${{ steps.latest_tag.outputs.tag }}
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # Check commit messages since last tag
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            NEW="v$((MAJOR+1)).0.0"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            NEW="v${MAJOR}.$((MINOR+1)).0"
          else
            NEW="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi

          echo "new_tag=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumping $LATEST → $NEW"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          generate_release_notes: true
