name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Staging Deploy
    runs-on: self-hosted
    environment: staging

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Write staging env file
        run: |
          @"
          STAGING_DB_CONNECTION=${{ secrets.STAGING_DB_CONNECTION }}
          STAGING_JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          STAGING_API_URL=${{ secrets.STAGING_API_URL }}
          STAGING_FRONTEND_URL=${{ secrets.STAGING_FRONTEND_URL }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          "@ | Out-File -FilePath .env.staging -Encoding utf8

      - name: Run EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef --version 9.* 2>&1 | Out-Null
          $env:PATH = "$env:PATH;$env:USERPROFILE\.dotnet\tools"
          $env:ConnectionStrings__DefaultConnection = "${{ secrets.STAGING_DB_CONNECTION }}"
          dotnet ef database update `
            --project src/backend/Wixi.Modules.Core/Wixi.Modules.Core.csproj `
            --startup-project src/backend/Wixi.API/Wixi.API.csproj `
            2>&1 | Tee-Object -Variable migOut
          if ($LASTEXITCODE -ne 0) {
            Write-Host "FAIL: Migration failed"; Write-Host $migOut; exit 1
          }
          Write-Host "Migrations OK"

      - name: Save current images as previous (rollback point)
        run: |
          $b = docker inspect wixi-backend:staging --format='{{.Id}}' 2>&1
          $f = docker inspect wixi-frontend:staging --format='{{.Id}}' 2>&1
          if ($LASTEXITCODE -eq 0 -or $b -match 'sha256') {
            docker tag wixi-backend:staging wixi-backend:previous 2>&1 | Out-Null
            Write-Host "Backend previous image saved"
          }
          $LASTEXITCODE = 0  # reset — previous tag yoksa sorun degil
          docker inspect wixi-frontend:staging 2>&1 | Out-Null
          if ($?) {
            docker tag wixi-frontend:staging wixi-frontend:previous 2>&1 | Out-Null
            Write-Host "Frontend previous image saved"
          }
          exit 0

      - name: Build images (with layer cache)
        run: |
          $env:DOCKER_BUILDKIT = "1"
          $env:COMPOSE_DOCKER_CLI_BUILD = "1"
          docker compose -f docker-compose.staging.yml --env-file .env.staging build `
            --build-arg BUILDKIT_INLINE_CACHE=1

      - name: Start containers
        run: |
          docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --remove-orphans

      - name: Smoke tests
        if: false
        run: |
          # Wait for containers (max 90s)
          $waited = 0
          Write-Host "Waiting for backend..."
          do {
            Start-Sleep -Seconds 5; $waited += 5
            try { $r = Invoke-WebRequest -Uri "http://localhost:5182/health" -UseBasicParsing -EA Stop; if ($r.StatusCode -eq 200) { break } } catch {}
          } while ($waited -lt 90)
          if ($waited -ge 90) { Write-Host "FAIL: Backend did not start in 90s"; exit 1 }

          function Test-Endpoint {
            param($Label, $Uri, $Method = 'GET', $Body = $null, [int[]]$Expect)
            try {
              $p = @{ Uri = $Uri; Method = $Method; UseBasicParsing = $true; EA = 'Stop' }
              if ($Body) { $p.Body = $Body; $p.ContentType = 'application/json' }
              $code = (Invoke-WebRequest @p).StatusCode
            } catch { $code = [int]$_.Exception.Response.StatusCode }
            if ($Expect -contains $code) { Write-Host "OK  [$code] $Label" }
            else { Write-Host "FAIL [$code] $Label (expected: $($Expect -join '|'))"; exit 1 }
          }

          # Backend
          Test-Endpoint "Health"              "http://localhost:5182/health"                  -Expect 200
          Test-Endpoint "Auth/me → 401"       "http://localhost:5182/api/v1/Auth/me"          -Expect 401
          Test-Endpoint "Auth/login → 400"    "http://localhost:5182/api/v1/Auth/login" POST '{"email":"smoke@invalid","password":"x"}' -Expect 400,422
          Test-Endpoint "Module list → 401"   "http://localhost:5182/api/v1/Module"           -Expect 401

          # Frontend
          Test-Endpoint "Frontend HTML → 200" "http://localhost:3001"                         -Expect 200

          Write-Host "All smoke tests passed."

      - name: Auto-rollback on smoke test failure
        if: failure()
        run: |
          Write-Host "Smoke tests failed — rolling back to previous images..."
          $b = docker inspect wixi-backend:previous 2>&1
          if ($LASTEXITCODE -ne 0) { Write-Host "No previous image found, cannot rollback"; exit 1 }
          docker tag wixi-backend:previous wixi-backend:staging
          docker tag wixi-frontend:previous wixi-frontend:staging
          docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --no-build --no-recreate 2>&1
          Write-Host "Rollback complete — previous version restored"

      - name: Cleanup env file
        if: always()
        run: Remove-Item -Force .env.staging -ErrorAction SilentlyContinue
