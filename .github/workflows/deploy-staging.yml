name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Staging Deploy
    runs-on: self-hosted
    environment: staging

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Write staging env file
        run: |
          @"
          STAGING_DB_CONNECTION=${{ secrets.STAGING_DB_CONNECTION }}
          STAGING_JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          STAGING_API_URL=${{ secrets.STAGING_API_URL }}
          STAGING_FRONTEND_URL=${{ secrets.STAGING_FRONTEND_URL }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          "@ | Out-File -FilePath .env.staging -Encoding utf8

      - name: Build & start containers
        run: |
          docker compose -f docker-compose.staging.yml --env-file .env.staging up --build -d --remove-orphans

      - name: Health check
        run: |
          Start-Sleep -Seconds 30
          $response = Invoke-WebRequest -Uri "http://localhost:5182/health" -UseBasicParsing
          if ($response.StatusCode -ne 200) { exit 1 }
          Write-Host "Staging healthy - OK"

      - name: Cleanup env file
        if: always()
        run: Remove-Item -Force .env.staging -ErrorAction SilentlyContinue
