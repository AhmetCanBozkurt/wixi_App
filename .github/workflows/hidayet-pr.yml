name: Hidayet → Develop PR

on:
  push:
    branches:
      - hidayet-develop

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: PR Aç (zaten varsa atla)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head hidayet-develop --base develop --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING zaten açık, atlanıyor."
          else
            gh pr create \
              --title "Hidayet: $(git log -1 --pretty=%s)" \
              --body "Hidayet'in push ettiği değişiklikler. İnceleyip merge edebilirsin. 🚀" \
              --head hidayet-develop \
              --base develop
          fi
