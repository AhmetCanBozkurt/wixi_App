name: CI Hata Yorumu

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  comment-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: PR numarasÄąnÄą bul
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh api \
            "repos/${{ github.repository }}/pulls?state=open&head=${{ github.event.workflow_run.head_repository.owner.login }}:${{ github.event.workflow_run.head_branch }}" \
            --jq '.[0].number')
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Hata loglarÄąnÄą Ã§ek
        id: get-logs
        if: steps.find-pr.outputs.pr != '' && steps.find-pr.outputs.pr != 'null'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          # BaÅarÄąsÄąz job'larÄą bul
          FAILED_JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {name: .name, id: .id}]')

          LOG_CONTENT=""
          while IFS= read -r job; do
            JOB_NAME=$(echo "$job" | jq -r '.name')
            JOB_ID=$(echo "$job" | jq -r '.id')

            # Job logunu Ã§ek, hata satÄąrlarÄąnÄą filtrele
            JOB_LOG=$(gh api "repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" 2>/dev/null | \
              grep -i "error\|Error\|failed\|Failed\|warning\|Warning" | \
              tail -50 || echo "Log alÄąnamadÄą")

            LOG_CONTENT="${LOG_CONTENT}### â ${JOB_NAME}\n\`\`\`\n${JOB_LOG}\n\`\`\`\n\n"
          done < <(echo "$FAILED_JOBS" | jq -c '.[]')

          # Ãok uzunsa kÄąrp
          LOG_CONTENT=$(echo -e "$LOG_CONTENT" | head -100)

          # Output'a yaz (multiline iÃ§in)
          {
            echo "logs<<EOF"
            echo -e "$LOG_CONTENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: PR'a yorum at
        if: steps.find-pr.outputs.pr != '' && steps.find-pr.outputs.pr != 'null'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.find-pr.outputs.pr }}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

          BODY="## ðī CI BaÅarÄąsÄąz

          **Branch:** \`${{ github.event.workflow_run.head_branch }}\`
          **Commit:** \`${{ github.event.workflow_run.head_sha }}\`
          **[Actions logunu gÃķr]($RUN_URL)**

          ${{ steps.get-logs.outputs.logs }}

          ---
          > Bu yorumu Claude Code'a yapÄąÅtÄąrÄąp dÃžzeltmesini isteyebilirsin."

          gh pr comment $PR --repo ${{ github.repository }} --body "$BODY"
