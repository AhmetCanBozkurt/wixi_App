name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false    # Production deploy iptal edilmez, sıraya girer

jobs:
  deploy:
    name: Production Deploy
    runs-on: self-hosted
    environment: production     # GitHub'da "required reviewers" tanımlı — onay gerekir

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Write prod env file
        run: |
          @"
          PROD_DB_CONNECTION=${{ secrets.PROD_DB_CONNECTION }}
          PROD_JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          PROD_STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
          PROD_STRIPE_PUBLISHABLE_KEY=${{ secrets.PROD_STRIPE_PUBLISHABLE_KEY }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          APP_VERSION=${{ github.ref_name }}
          "@ | Out-File -FilePath .env.prod -Encoding utf8

      - name: Run DB migrations
        run: |
          docker build -t wixi-backend:migrate -f src/backend/Wixi.API/Dockerfile src/backend
          docker run --rm `
            -e "ConnectionStrings__DefaultConnection=${{ secrets.PROD_DB_CONNECTION }}" `
            -e "ASPNETCORE_ENVIRONMENT=Production" `
            wixi-backend:migrate `
            dotnet ef database update `
              --project Wixi.Modules.Core/Wixi.Modules.Core.csproj `
              --startup-project Wixi.API/Wixi.API.csproj

      - name: Build & deploy
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d

      - name: Health check
        run: |
          Start-Sleep -Seconds 20
          $response = Invoke-WebRequest -Uri "http://localhost:5181/health" -UseBasicParsing
          if ($response.StatusCode -ne 200) { exit 1 }
          Write-Host "Production healthy ✓"

      - name: Cleanup env file
        if: always()
        run: Remove-Item -Force .env.prod -ErrorAction SilentlyContinue
