# Production ortamı — dış SQL Server kullanır, restart always
# Reverse proxy: mevcut nginx (host makinede) -> 5181 (backend) ve 3000 (frontend)
#
# Required env vars (injected via .env.prod from deploy-prod.yml):
#   PROD_DB_CONNECTION, PROD_JWT_SECRET, PROD_STRIPE_SECRET_KEY,
#   PROD_STRIPE_PUBLISHABLE_KEY, PROD_IYZIPAY_API_KEY, PROD_IYZIPAY_SECRET_KEY,
#   PROD_IYZIPAY_BASE_URL, PROD_FRONTEND_URL, PROD_API_URL,
#   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, APP_VERSION

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Wixi.API/Dockerfile
    image: wixi-backend:${APP_VERSION:-latest}
    restart: always
    ports:
      - "5181:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "${PROD_DB_CONNECTION}"
      JwtSettings__SecretKey: "${PROD_JWT_SECRET}"
      JwtSettings__Issuer: "wixi"
      JwtSettings__Audience: "wixi"
      JwtSettings__ExpiryMinutes: "60"
      Stripe__SecretKey: "${PROD_STRIPE_SECRET_KEY}"
      Stripe__PublishableKey: "${PROD_STRIPE_PUBLISHABLE_KEY}"
      Iyzipay__ApiKey: "${PROD_IYZIPAY_API_KEY}"
      Iyzipay__SecretKey: "${PROD_IYZIPAY_SECRET_KEY}"
      Iyzipay__BaseUrl: "${PROD_IYZIPAY_BASE_URL}"
      Mail__Host: "${MAIL_HOST}"
      Mail__Port: "${MAIL_PORT}"
      Mail__Username: "${MAIL_USERNAME}"
      Mail__Password: "${MAIL_PASSWORD}"
      AppUrls__FrontendBaseUrl: "${PROD_FRONTEND_URL}"
      AppCors__Origins__0: "https://app.wixisoftware.com"
      AppCors__Origins__1: "http://app.wixisoftware.com"
    volumes:
      - prod_uploads:/app/wwwroot/uploads
      - prod_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_API_URL: "${PROD_API_URL}"
    image: wixi-frontend:${APP_VERSION:-latest}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prod_uploads:
  prod_logs:
