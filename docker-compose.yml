# Lokal geliştirme ortamı — SQL Server dahil, hot-reload yok (build gerekir)
# Kullanım: docker compose up --build
#
# Gerekli .env değişkenleri -> .env.example dosyasına bak

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./src/backend
      dockerfile: Wixi.API/Dockerfile
    ports:
      - "5181:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=WixiCore_Dev;
        User Id=sa;Password=${DB_SA_PASSWORD};
        TrustServerCertificate=True;MultipleActiveResultSets=True
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "wixi-dev"
      JwtSettings__Audience: "wixi-dev"
      JwtSettings__ExpiryMinutes: "60"
    volumes:
      - backend_uploads:/app/wwwroot/uploads
      - backend_logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_API_URL: "http://localhost:5181/api/v1"
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sqldata:
  backend_uploads:
  backend_logs:
