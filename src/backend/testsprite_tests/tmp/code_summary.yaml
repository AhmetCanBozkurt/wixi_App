version: "2"
type: backend
tech_stack:
  - C#
  - ASP.NET Core 8/9
  - Entity Framework Core
  - SQL Server
  - MediatR (CQRS)
features:
  - name: Authentication API
    description: Login, Register, Logout and Current User operations.
    files:
      - Wixi.API/Controllers/AuthController.cs
    endpoints:
      - method: POST
        path: /api/v1/Auth/login
        description: Authenticate user and return JWT token
        auth_required: false
      - method: POST
        path: /api/v1/Auth/register
        description: Register a new user
        auth_required: false
      - method: GET
        path: /api/v1/Auth/me
        description: Get current authenticated user details
        auth_required: true
  - name: Menu Management API
    description: CRUD operations for sidebar and global menus.
    files:
      - Wixi.API/Controllers/MenuController.cs
    endpoints:
      - method: GET
        path: /api/v1/Menu/sidebar
        description: Get menus for the sidebar
        auth_required: true
      - method: GET
        path: /api/v1/Menu/all
        description: Get all menus (Admin)
        auth_required: true
  - name: User Management API
    description: Managing users and their specific menu assignments.
    files:
      - Wixi.API/Controllers/UserManagementController.cs
    endpoints:
      - method: GET
        path: /api/v1/UserManagement/users
        description: List all users
        auth_required: true
  - name: Audit Logging API
    description: Accessing system activity and audit logs.
    files:
      - Wixi.API/Controllers/AuditController.cs
    endpoints:
      - method: GET
        path: /api/v1/Audit
        description: List audit logs with filters
        auth_required: true
known_limitations: []
