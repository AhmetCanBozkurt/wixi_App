# Staging Nginx — api-staging.domain.com + app-staging.domain.com
# SSL eklenecek (Faz sonrası Certbot ile)

server {
    listen 80;
    server_name api-test.wixisoftware.com;

    location / {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Büyük upload'lara izin ver (store görselleri)
        client_max_body_size 20M;
    }
}

server {
    listen 80;
    server_name app-test.wixisoftware.com;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
