services:
  wixi-tekstil-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      # No build args - let the app decide based on protocol
    ports:
      - "6013:6013"
    restart: unless-stopped
    container_name: wixi.tekstil.frontend
    # No environment variables - let the app decide based on protocol
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wixi-network

networks:
  wixi-network:
    external: true

