# Staging ortamı — dış SQL Server kullanır
# Reverse proxy: mevcut nginx (host makinede) -> 5182 (backend) ve 3001 (frontend)

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Wixi.API/Dockerfile
    image: wixi-backend:staging
    restart: unless-stopped
    ports:
      - "5182:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "${STAGING_DB_CONNECTION}"
      JwtSettings__SecretKey: "${STAGING_JWT_SECRET}"
      JwtSettings__Issuer: "wixi-staging"
      JwtSettings__Audience: "wixi-staging"
      JwtSettings__ExpiryMinutes: "60"
      Iyzipay__ApiKey: "${STAGING_IYZIPAY_API_KEY}"
      Iyzipay__SecretKey: "${STAGING_IYZIPAY_SECRET_KEY}"
      Iyzipay__BaseUrl: "${STAGING_IYZIPAY_BASE_URL}"
      Mail__Host: "${MAIL_HOST}"
      Mail__Port: "${MAIL_PORT}"
      Mail__Username: "${MAIL_USERNAME}"
      Mail__Password: "${MAIL_PASSWORD}"
      AppUrls__FrontendBaseUrl: "${STAGING_FRONTEND_URL}"
    volumes:
      - staging_uploads:/app/wwwroot/uploads
      - staging_logs:/app/logs

  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_API_URL: "${STAGING_API_URL}"
    image: wixi-frontend:staging
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  staging_uploads:
  staging_logs:
